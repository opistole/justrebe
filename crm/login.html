<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ReBe CRM · Sign in</title>
<link rel="icon" type="image/jpeg" href="/ReBe_Favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:#FFFFFF; --mist:#FAF9F7; --navy:#060B50; --navy-dark:#040832;
    --green:#449945; --green-ink:#3A8438; --gold:#E3A01F; --gold-ink:#B07D14;
    --slate:#212B37; --body:#4A535E; --muted:#9DA1A8; --bone:#E2E2E2; --coral:#EA492E;
    --serif:'Fraunces',Georgia,serif;
    --sans:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--navy-dark);color:#fff;font-family:var(--sans);font-weight:400;font-size:17px;line-height:1.65;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
       background-image:radial-gradient(ellipse at 80% 10%,rgba(227,160,31,.18),transparent 55%),radial-gradient(ellipse at 10% 90%,rgba(68,153,69,.18),transparent 50%)}
  .wrap{width:100%;max-width:420px;background:#fff;color:var(--body);border-radius:16px;border-top:4px solid var(--green);padding:48px 40px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  @media (max-width:480px){.wrap{padding:36px 24px}}
  .brand{font-family:var(--sans);font-weight:700;color:var(--navy);font-size:22px;letter-spacing:.02em;text-align:center;margin:0 0 4px}
  .brand span{color:var(--green)}
  .eyebrow{font-family:var(--sans);text-transform:uppercase;font-weight:700;font-size:11px;letter-spacing:.16em;color:var(--green-ink);text-align:center;margin:0 0 22px}
  h1{font-family:var(--serif);font-style:italic;font-weight:400;font-size:26px;color:var(--navy);margin:0 0 8px;text-align:center;line-height:1.2}
  .sub{font-size:14px;color:var(--muted);text-align:center;margin:0 0 28px;line-height:1.55}
  label{display:block;font-family:var(--sans);text-transform:uppercase;font-weight:700;font-size:11px;letter-spacing:.06em;color:var(--slate);margin-bottom:8px}
  input[type=email]{width:100%;background:var(--mist);border:1px solid var(--bone);border-radius:10px;padding:14px 16px;font-family:var(--sans);font-size:16px;color:var(--slate);transition:border-color .15s,box-shadow .15s}
  input[type=email]:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(68,153,69,.15);background:#fff}
  button{width:100%;margin-top:18px;background:linear-gradient(135deg,#54AC54,var(--green-ink));color:#fff;border:none;border-radius:50px;padding:16px 24px;min-height:52px;font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:.02em;cursor:pointer;box-shadow:0 8px 22px rgba(68,153,69,.28);transition:transform .15s var(--ease),box-shadow .2s var(--ease),filter .15s var(--ease)}
  button:hover:not([disabled]){filter:brightness(1.07);transform:translateY(-2px);box-shadow:0 12px 30px rgba(68,153,69,.38)}
  button[disabled]{opacity:.7;cursor:wait}
  .status{margin-top:18px;font-size:14px;line-height:1.55;text-align:center;color:var(--body)}
  .status.success{color:var(--green-ink);font-weight:700}
  .status.error{color:var(--coral);font-weight:700}
  .footnote{text-align:center;font-size:12px;color:var(--muted);margin-top:24px;line-height:1.55}
  .footnote a{color:var(--green-ink)}
</style>
</head>
<body>
<main class="wrap">
  <p class="brand">Re<span>Be</span></p>
  <p class="eyebrow">Team CRM</p>
  <h1>Sign in.</h1>
  <p class="sub">We'll email you a one-tap link.<br>No password to remember.</p>

  <form id="login-form" novalidate>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@justrebe.com">
    <button id="submit" type="submit">Send sign-in link →</button>
    <p class="status" id="status" role="status" aria-live="polite"></p>
  </form>

  <p class="footnote">Only team members on the allowlist can sign in.<br>Not on the list? Ask Osil to add you.</p>
</main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const SUPABASE_URL = 'https://erbncxjkgwqtfhulricc.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_3L24YRPqcRSQNHWa8ofpSA_t0mAB6LY'
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

  // If we arrive here with a Supabase session (already signed in), go straight to dashboard
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    window.location.replace('/crm/index.html')
  }

  const form = document.getElementById('login-form')
  const emailEl = document.getElementById('email')
  const btn = document.getElementById('submit')
  const status = document.getElementById('status')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    status.className = 'status'
    status.textContent = ''
    const email = emailEl.value.trim().toLowerCase()
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      status.className = 'status error'
      status.textContent = 'Please enter a valid email address.'
      return
    }
    btn.disabled = true
    btn.textContent = 'Sending…'
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + '/crm/index.html',
        shouldCreateUser: true
      }
    })
    if (error) {
      status.className = 'status error'
      status.textContent = "Couldn't send the link. " + (error.message || 'Try again.')
      btn.disabled = false
      btn.textContent = 'Send sign-in link →'
      return
    }
    status.className = 'status success'
    status.textContent = 'Check your email — the link expires in 1 hour.'
    btn.textContent = 'Link sent ✓'
  })
</script>
</body>
</html>
