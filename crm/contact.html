<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Contact · ReBe CRM</title>
<link rel="icon" type="image/jpeg" href="/ReBe_Favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:#FFFFFF; --mist:#FAF9F7; --navy:#060B50; --navy-dark:#040832;
    --green:#449945; --green-ink:#3A8438; --green-wash:#F2F8F2;
    --gold:#E3A01F; --gold-ink:#B07D14; --gold-wash:#FBF4E4;
    --slate:#212B37; --body:#4A535E; --muted:#9DA1A8; --bone:#E2E2E2; --coral:#EA492E;
    --serif:'Fraunces',Georgia,serif;
    --sans:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--mist);color:var(--body);font-family:var(--sans);font-size:15px;line-height:1.65;min-height:100vh}
  a{color:var(--green-ink);text-decoration:none}
  a:hover{text-decoration:underline}

  .gate{position:fixed;inset:0;background:var(--mist);display:flex;align-items:center;justify-content:center;z-index:1000;font-size:14px;color:var(--muted)}
  .gate.hidden{display:none}

  header.bar{position:sticky;top:0;z-index:50;background:var(--navy-dark);color:#fff;border-bottom:3px solid var(--green)}
  .bar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 28px}
  .brand{font-family:var(--sans);font-weight:700;font-size:18px;color:#fff;text-decoration:none}
  .brand span{color:var(--green)}
  .brand small{font-weight:400;color:rgba(255,255,255,.55);margin-left:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
  .me{display:flex;align-items:center;gap:14px;font-size:13px;color:rgba(255,255,255,.85)}
  .signout{font-size:13px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:50px}
  .signout:hover{background:rgba(255,255,255,.1)}

  .page{max-width:1100px;margin:0 auto;padding:28px 28px 96px}
  .crumb{font-family:var(--sans);font-size:13px;color:var(--muted);margin:0 0 20px}
  .crumb a{color:var(--muted);font-weight:700}
  .crumb a:hover{color:var(--navy)}

  /* Identity card */
  .person{background:#fff;border:1px solid var(--bone);border-top:4px solid var(--green);border-radius:14px;padding:32px 36px;display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;margin-bottom:24px;box-shadow:0 6px 20px rgba(6,11,80,.04)}
  .pname{font-family:var(--serif);font-style:italic;font-weight:600;font-size:34px;color:var(--navy);margin:0 0 8px;line-height:1.15}
  .pinfo{display:flex;flex-wrap:wrap;gap:24px;color:var(--body)}
  .pinfo > div{font-size:14px}
  .pinfo .k{display:block;text-transform:uppercase;font-weight:700;font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
  .pinfo a{color:var(--navy);font-weight:700}
  .actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .src-badge{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:50px}
  .src-workshop{background:rgba(141,176,205,.18);color:#3a648a}
  .src-cohort{background:var(--green-wash);color:var(--green-ink)}
  .src-1on1{background:var(--gold-wash);color:var(--gold-ink)}

  /* Two-column layout below identity */
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:24px}
  @media (max-width:860px){.cols{grid-template-columns:1fr}}

  .card{background:#fff;border:1px solid var(--bone);border-radius:14px;padding:26px 28px;box-shadow:0 6px 20px rgba(6,11,80,.04)}
  .card h2{font-family:var(--serif);font-style:italic;font-weight:400;font-size:20px;color:var(--navy);margin:0 0 16px}
  .card h3{font-family:var(--sans);text-transform:uppercase;font-weight:700;font-size:11px;letter-spacing:.1em;color:var(--muted);margin:18px 0 8px}
  .card h3:first-child{margin-top:0}
  .field{margin-bottom:12px}
  .field .k{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .field .v{font-size:15px;color:var(--slate);word-wrap:break-word}
  .field .v.muted{color:var(--muted);font-style:italic}

  /* Engagement timeline */
  .eng{display:flex;flex-direction:column;gap:10px}
  .eng-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--mist);border:1px solid var(--bone);border-radius:10px;cursor:pointer;transition:border-color .12s var(--ease)}
  .eng-row:hover{border-color:var(--green)}
  .eng-row.current{border-color:var(--green);background:var(--green-wash)}
  .eng-row .ttl{font-weight:700;color:var(--navy);font-size:14px}
  .eng-row .when{font-size:12px;color:var(--muted)}

  /* Notes */
  .notes{display:flex;flex-direction:column;gap:14px;margin-top:14px}
  .note{background:var(--mist);border:1px solid var(--bone);border-radius:10px;padding:14px 16px;position:relative}
  .note .body{font-size:14px;color:var(--slate);line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .note .meta{font-size:11px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .note .meta .author{font-weight:700;color:var(--green-ink)}
  .note .del{background:none;border:none;color:var(--coral);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;padding:0}
  .note .del:hover{text-decoration:underline}
  .note-empty{text-align:center;padding:24px;color:var(--muted);font-style:italic;font-size:14px;border:1px dashed var(--bone);border-radius:10px}

  .note-form textarea{width:100%;background:var(--mist);border:1px solid var(--bone);border-radius:10px;padding:12px 14px;font-family:var(--sans);font-size:15px;color:var(--slate);min-height:88px;resize:vertical;transition:border-color .15s,box-shadow .15s}
  .note-form textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(68,153,69,.12);background:#fff}
  .note-form .row{display:flex;justify-content:flex-end;margin-top:10px}
  .note-form button{background:linear-gradient(135deg,#54AC54,var(--green-ink));color:#fff;border:none;border-radius:50px;padding:10px 22px;min-height:42px;font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.02em;cursor:pointer;box-shadow:0 6px 18px rgba(68,153,69,.22);transition:transform .15s var(--ease)}
  .note-form button:hover:not([disabled]){transform:translateY(-1px)}
  .note-form button[disabled]{opacity:.6;cursor:wait}

  .errbox{background:#fdecea;border:1px solid #f5b7b1;color:#922b21;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:14px}

  @media (max-width:760px){
    .page{padding:20px 16px 60px}
    .bar-inner{padding:12px 16px}
    .person{padding:24px}
    .pname{font-size:26px}
  }
</style>
</head>
<body>

<div class="gate" id="gate">Loading…</div>

<header class="bar">
  <div class="bar-inner">
    <a href="/crm/index.html" class="brand">Re<span>Be</span> <small>CRM</small></a>
    <div class="me">
      <span id="me-name">—</span>
      <a href="#" id="signout" class="signout">Sign out</a>
    </div>
  </div>
</header>

<main class="page" id="page" hidden>
  <p class="crumb"><a href="/crm/index.html">← All contacts</a></p>

  <section class="person">
    <div>
      <h1 class="pname" id="pname">—</h1>
      <div class="pinfo">
        <div><span class="k">Email</span><a id="pemail" href="#">—</a></div>
        <div><span class="k">Phone</span><span id="pphone">—</span></div>
        <div><span class="k">First seen</span><span id="pfirst">—</span></div>
      </div>
    </div>
    <div class="actions">
      <span class="src-badge" id="psource">—</span>
    </div>
  </section>

  <div class="cols">

    <section class="card">
      <h2>Notes</h2>
      <form class="note-form" id="note-form">
        <textarea id="note-body" placeholder="Add a note — call summary, follow-up, anything the team should see." required></textarea>
        <div class="row"><button type="submit" id="note-btn">Save note</button></div>
      </form>
      <div id="note-error"></div>
      <div class="notes" id="notes"></div>
    </section>

    <section class="card">
      <h3>This signup</h3>
      <div id="signup-detail"></div>

      <h3>Other engagements</h3>
      <div class="eng" id="other-engagements"></div>
    </section>

  </div>
</main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const SUPABASE_URL = 'https://erbncxjkgwqtfhulricc.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_3L24YRPqcRSQNHWa8ofpSA_t0mAB6LY'
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
  window.__supa = supabase

  // ----- Auth gate -----
  const gate = document.getElementById('gate')
  let { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.replace('/crm/login.html'); throw new Error('not signed in') }

  const myEmail = (session.user.email || '').toLowerCase()
  const { data: meRow } = await supabase.from('admin_emails').select('email,display_name,role').eq('email', myEmail).maybeSingle()
  if (!meRow){
    gate.innerHTML = `Not on the allowlist. <a href="/crm/login.html" style="color:var(--green-ink);margin-left:8px">Back</a>`
    return
  }
  document.getElementById('me-name').textContent = meRow.display_name || myEmail
  document.getElementById('signout').addEventListener('click', async (e) => {
    e.preventDefault(); await supabase.auth.signOut(); window.location.href = '/crm/login.html'
  })

  // ----- Parse URL params -----
  const params = new URLSearchParams(window.location.search)
  const source = params.get('source')
  const signupId = params.get('id')
  const emailParam = (params.get('email') || '').toLowerCase()
  if (!source || !signupId){ gate.innerHTML = 'Missing contact reference.'; return }

  // ----- Load the specific signup row from the unified view -----
  const { data: thisRow, error: thisErr } = await supabase
    .from('crm_signups')
    .select('*')
    .eq('signup_id', signupId)
    .eq('source', source)
    .maybeSingle()

  if (thisErr || !thisRow){
    gate.innerHTML = `Contact not found. ${thisErr ? thisErr.message : ''}`
    return
  }

  const email = (thisRow.email || emailParam).toLowerCase()

  // ----- Load all other engagements for this email -----
  const { data: allEng } = await supabase
    .from('crm_signups')
    .select('*')
    .eq('email', email)
    .order('created_at', { ascending: false })

  // ----- Load notes for this email -----
  const { data: notes } = await supabase
    .from('crm_notes')
    .select('*')
    .eq('contact_email', email)
    .order('created_at', { ascending: false })

  // ----- Render -----
  document.getElementById('pname').textContent = thisRow.name || '—'
  const emailLink = document.getElementById('pemail')
  emailLink.textContent = email; emailLink.href = 'mailto:' + email
  document.getElementById('pphone').textContent = thisRow.phone || '—'
  document.getElementById('pfirst').textContent = formatDate(thisRow.created_at)
  const srcBadge = document.getElementById('psource')
  srcBadge.textContent = labelFor(source); srcBadge.className = 'src-badge src-' + source

  // Signup detail card
  document.getElementById('signup-detail').innerHTML = buildSignupDetail(thisRow)

  // Other engagements
  const others = (allEng || []).filter(r => !(r.signup_id === signupId && r.source === source))
  const engEl = document.getElementById('other-engagements')
  if (others.length === 0) engEl.innerHTML = `<p style="color:var(--muted);font-size:13px;font-style:italic;margin:0">No other signups under this email.</p>`
  else engEl.innerHTML = others.map(o => {
    const url = '/crm/contact.html?' + new URLSearchParams({source:o.source,id:o.signup_id,email:o.email||''}).toString()
    return `<a class="eng-row" href="${url}">
      <span class="ttl">${escapeHTML(o.program_title || labelFor(o.source))}</span>
      <span class="when">${escapeHTML(o.status || '')} · ${formatDate(o.created_at)}</span>
    </a>`
  }).join('')

  renderNotes(notes || [])

  document.getElementById('page').hidden = false
  gate.classList.add('hidden')

  // ----- Notes form -----
  const noteForm = document.getElementById('note-form')
  const noteBody = document.getElementById('note-body')
  const noteBtn = document.getElementById('note-btn')
  const noteErr = document.getElementById('note-error')

  noteForm.addEventListener('submit', async (e) => {
    e.preventDefault()
    noteErr.innerHTML = ''
    const body = (noteBody.value || '').trim()
    if (!body){ noteBody.focus(); return }
    noteBtn.disabled = true; noteBtn.textContent = 'Saving…'
    const { data, error } = await supabase
      .from('crm_notes')
      .insert({ contact_email: email, body, author_email: myEmail })
      .select('*')
      .single()
    if (error){
      noteErr.innerHTML = `<div class="errbox">Couldn't save: ${error.message}</div>`
      noteBtn.disabled = false; noteBtn.textContent = 'Save note'
      return
    }
    noteBody.value = ''
    noteBtn.disabled = false; noteBtn.textContent = 'Save note'
    // Prepend the new note
    const tbody = document.getElementById('notes')
    tbody.insertAdjacentHTML('afterbegin', renderNote(data))
    bindNoteDelete()
  })

  function renderNotes(arr){
    const el = document.getElementById('notes')
    if (!arr || arr.length === 0){
      el.innerHTML = `<div class="note-empty">No notes yet. Start the thread above.</div>`
      return
    }
    el.innerHTML = arr.map(renderNote).join('')
    bindNoteDelete()
  }
  function renderNote(n){
    const canDelete = (n.author_email || '').toLowerCase() === myEmail
    return `<div class="note" data-id="${n.id}">
      <div class="body">${escapeHTML(n.body)}</div>
      <div class="meta">
        <span><span class="author">${escapeHTML(n.author_email || 'unknown')}</span> · ${formatWhen(n.created_at)}</span>
        ${canDelete ? `<button class="del" data-id="${n.id}">Delete</button>` : ''}
      </div>
    </div>`
  }
  function bindNoteDelete(){
    document.querySelectorAll('.note .del').forEach(b => {
      b.onclick = async () => {
        if (!confirm('Delete this note?')) return
        const id = b.dataset.id
        const { error } = await supabase.from('crm_notes').delete().eq('id', id)
        if (!error){ document.querySelector(`.note[data-id="${id}"]`)?.remove() }
        else alert('Could not delete: ' + error.message)
      }
    })
  }

  function buildSignupDetail(r){
    const blocks = []
    blocks.push(field('Program', r.program_title))
    blocks.push(field('Status', r.status))
    if (r.readiness) blocks.push(field('Readiness', r.readiness))
    if (r.preferred_confidant) blocks.push(field('Preferred confidant', r.preferred_confidant))
    if (r.situation_or_reason) blocks.push(field(r.source === '1on1' ? 'Situation' : 'Reason for interest', r.situation_or_reason))
    if (r.paypal_order_id) blocks.push(field('PayPal order', r.paypal_order_id))
    blocks.push(field('Signed up', formatDate(r.created_at)))
    return blocks.join('')
  }
  function field(k, v){
    if (v === null || v === undefined || v === '') return `<div class="field"><span class="k">${escapeHTML(k)}</span><span class="v muted">—</span></div>`
    return `<div class="field"><span class="k">${escapeHTML(k)}</span><span class="v">${escapeHTML(String(v))}</span></div>`
  }
  function labelFor(s){ return s === '1on1' ? '1:1' : s.charAt(0).toUpperCase() + s.slice(1) }
  function formatDate(d){ if (!d) return '—'; return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) }
  function formatWhen(d){
    if (!d) return ''
    const dt = new Date(d), now = new Date()
    const diff = (now - dt) / 1000
    if (diff < 60) return 'just now'
    if (diff < 3600) return Math.floor(diff/60) + 'm ago'
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago'
    return dt.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})
  }
  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }
</script>
</body>
</html>
