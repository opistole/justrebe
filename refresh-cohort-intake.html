<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ReBe ReFresh · Cohort Intake</title>
<meta name="description" content="Intake for facilitators and complimentary participants of the ReBe ReFresh cohort." />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/jpeg" href="/ReBe_Favicon.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:#FFFFFF; --mist:#FAF9F7; --navy:#252C5C; --navy-dark:#040832;
    --green:#449945; --green-ink:#3A8438; --green-deep:#2A6D2C; --green-wash:#F2F8F2;
    --gold:#E3A01F; --gold-ink:#B07D14; --gold-wash:#FBF4E4;
    --slate:#212B37; --body:#4A535E; --muted:#9DA1A8; --bone:#E2E2E2; --coral:#EA492E;
    --serif:'Fraunces',Georgia,serif;
    --sans:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--mist);color:var(--body);font-family:var(--sans);font-weight:400;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}

  .wrap{max-width:680px;margin:0 auto;padding:48px 24px 80px}

  .brand{display:flex;align-items:center;gap:8px;margin:0 0 32px;text-decoration:none;color:inherit}
  .brand .wordmark{font-family:var(--serif);font-weight:600;font-size:22px;color:var(--navy);letter-spacing:-.005em}
  .brand .wordmark .accent{color:var(--gold-ink)}

  .header{margin:0 0 32px}
  .header .eyebrow{font-family:var(--sans);text-transform:uppercase;letter-spacing:.18em;font-size:11px;font-weight:700;color:var(--green-ink);margin:0 0 10px}
  .header h1{font-family:var(--serif);font-weight:600;font-size:36px;color:var(--navy);margin:0 0 12px;letter-spacing:-.01em;line-height:1.2}
  .header p{font-size:16px;color:var(--body);margin:0;max-width:540px}

  .card{background:#fff;border:1px solid var(--bone);border-radius:16px;padding:32px 28px;box-shadow:0 6px 24px rgba(6,11,80,.05)}

  fieldset{border:0;padding:0;margin:0 0 28px}
  fieldset:last-of-type{margin-bottom:0}
  legend{font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--green-ink);margin:0 0 14px;padding:0}

  .row{display:grid;grid-template-columns:1fr;gap:16px;margin:0 0 16px}
  .row.two{grid-template-columns:1fr 1fr}
  @media (max-width:560px){.row.two{grid-template-columns:1fr}}

  label{display:block;font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;margin:0 0 6px}
  label .req{color:var(--coral);font-weight:700;margin-left:4px}

  input[type="text"],input[type="email"],input[type="tel"],select,textarea{
    width:100%;padding:11px 14px;border:1px solid var(--bone);border-radius:10px;
    font-family:inherit;font-size:15px;color:var(--slate);background:#fff;
    transition:border-color .2s,box-shadow .2s;line-height:1.5;
  }
  input:focus,select:focus,textarea:focus{outline:0;border-color:var(--green);box-shadow:0 0 0 3px rgba(68,153,69,.15)}
  textarea{min-height:90px;resize:vertical}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23252C5C' d='M6 8L0 0h12z'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}

  .help{font-size:12px;color:var(--muted);margin:6px 0 0;line-height:1.5}

  .submit-row{display:flex;justify-content:flex-end;align-items:center;gap:14px;margin:24px 0 0}
  .btn{background:var(--green-ink);color:#fff;border:0;padding:13px 28px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:background .15s,transform .1s;font-family:var(--sans)}
  .btn:hover{background:var(--green-deep)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  .msg{margin:14px 0 0;padding:12px 14px;border-radius:10px;font-size:14px;line-height:1.5;display:none}
  .msg.show{display:block}
  .msg.error{background:#FFF1EE;color:#A33421;border:1px solid #F5B9AD}
  .msg.success{background:var(--green-wash);color:var(--green-deep);border:1px solid #BFE3BF}

  .footer{margin:36px 0 0;text-align:center;font-size:12px;color:var(--muted)}
  .footer a{color:var(--navy);text-decoration:none;border-bottom:1px solid var(--bone)}

  .hidden{display:none}

  .success-card{background:var(--green-wash);border:1px solid #BFE3BF;border-radius:14px;padding:28px 28px;text-align:center;margin:18px 0 0}
  .success-card h2{font-family:var(--serif);font-weight:600;font-size:24px;color:var(--green-deep);margin:0 0 8px}
  .success-card p{color:var(--green-deep);margin:0;font-size:15px}

  /* Radio / checkbox groups (match paid intake) */
  .checkgroup{display:flex;flex-direction:column;gap:8px;margin:4px 0 0}
  .checkgroup label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:9px 12px;border:1px solid var(--bone);border-radius:8px;background:#fff;transition:border-color .15s,background .15s;font-size:14px;color:var(--slate);text-transform:none;letter-spacing:0;font-weight:500;margin:0}
  .checkgroup label:hover{border-color:var(--green);background:var(--mist)}
  .checkgroup input[type="radio"],
  .checkgroup input[type="checkbox"]{margin:2px 0 0;accent-color:var(--green-ink);flex-shrink:0}
  .checkgroup input[type="radio"]:checked + span,
  .checkgroup input[type="checkbox"]:checked + span{color:var(--green-deep);font-weight:700}
  .checkgroup label:has(input:checked){border-color:var(--green);background:var(--green-wash)}
  @media (min-width:520px){
    .checkgroup--cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  }
  .req{color:var(--coral);font-weight:700}
  .opt{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">

  <a href="/" class="brand">
    <span class="wordmark">ReBe · <span class="accent">ReFresh</span></span>
  </a>

  <div class="header">
    <h1>ReFresh Cohort Intake</h1>
  </div>

  <div class="card" id="form-card">
    <form id="intake-form" novalidate>
      <fieldset>
        <legend>About you</legend>

        <div class="row two">
          <div>
            <label for="full_name">Full name <span class="req">*</span></label>
            <input type="text" id="full_name" name="full_name" required autocomplete="name">
          </div>
          <div>
            <label for="seat_type">Your role <span class="req">*</span></label>
            <select id="seat_type" name="seat_type" required>
              <option value="" disabled selected>Select one…</option>
              <option value="facilitator">Facilitator</option>
              <option value="attendee">Attendee</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="row two">
          <div>
            <label for="email">Email <span class="req">*</span></label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          <div>
            <label for="phone">Phone <span class="req">*</span></label>
            <input type="tel" id="phone" name="phone" required autocomplete="tel">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="group_type">Which cohort time slot? <span class="req">*</span></label>
            <select id="group_type" name="group_type" required>
              <option value="" disabled selected>Pick a slot…</option>
              <option value="11 AM ET">11 AM ET (Tuesdays)</option>
              <option value="8 PM ET">8 PM ET (Tuesdays)</option>
              <option value="Either">Either works</option>
            </select>
          </div>
        </div>

        <div class="row two">
          <div>
            <label for="city">City <span class="req">*</span></label>
            <input type="text" id="city" name="city" required autocomplete="address-level2">
          </div>
          <div>
            <label for="state">State / Province</label>
            <input type="text" id="state" name="state" autocomplete="address-level1">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="country">Country <span class="req">*</span></label>
            <select id="country" name="country" required>
              <option value="">Choose a country…</option>
              <option value="United States">United States</option>
              <option value="Canada">Canada</option>
              <option value="United Kingdom">United Kingdom</option>
              <option value="Australia">Australia</option>
              <option value="New Zealand">New Zealand</option>
              <option value="Ireland">Ireland</option>
              <option value="Mexico">Mexico</option>
              <option value="South Africa">South Africa</option>
              <option value="India">India</option>
              <option value="Germany">Germany</option>
              <option value="France">France</option>
              <option value="Other">Other (please add in the notes below)</option>
            </select>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Your story</legend>

        <div class="row">
          <div>
            <label>Have you done any ReBe or REAL TALK work before? <span class="req">*</span></label>
            <div class="checkgroup">
              <label><input type="radio" name="prior_experience" value="First time" required><span>This is my first time with ReBe</span></label>
              <label><input type="radio" name="prior_experience" value="Reset workshop"><span>I've done a Reset workshop</span></label>
              <label><input type="radio" name="prior_experience" value="REAL TALK program"><span>I've done the REAL TALK program</span></label>
              <label><input type="radio" name="prior_experience" value="Refresh cohort"><span>I've done a Refresh cohort before</span></label>
              <label><input type="radio" name="prior_experience" value="1:1 with a confidant"><span>I've had 1:1s with a ReBe confidant</span></label>
              <label><input type="radio" name="prior_experience" value="Multiple of the above"><span>Multiple of the above</span></label>
            </div>
          </div>
        </div>

        <div class="row">
          <div>
            <label>Why are you joining? <span class="opt">(select all that apply)</span> <span class="req">*</span></label>
            <div class="checkgroup checkgroup--cols">
              <label><input type="checkbox" name="why_here" value="Burnout"><span>Burnout</span></label>
              <label><input type="checkbox" name="why_here" value="Anxiety"><span>Anxiety</span></label>
              <label><input type="checkbox" name="why_here" value="Grief or loss"><span>Grief or loss</span></label>
              <label><input type="checkbox" name="why_here" value="Loneliness or isolation"><span>Loneliness or isolation</span></label>
              <label><input type="checkbox" name="why_here" value="Relationship challenges"><span>Relationship challenges</span></label>
              <label><input type="checkbox" name="why_here" value="Identity or purpose"><span>Identity / purpose</span></label>
              <label><input type="checkbox" name="why_here" value="Trauma recovery"><span>Trauma recovery</span></label>
              <label><input type="checkbox" name="why_here" value="Spiritual exploration"><span>Spiritual exploration</span></label>
              <label><input type="checkbox" name="why_here" value="Personal growth"><span>Personal growth</span></label>
              <label><input type="checkbox" name="why_here" value="Not feeling like myself"><span>Not feeling like myself</span></label>
              <label><input type="checkbox" name="why_here" value="Curious / exploring"><span>Curious / exploring</span></label>
              <label><input type="checkbox" name="why_here" value="Other"><span>Other (note below)</span></label>
            </div>
          </div>
        </div>

        <div class="row two">
          <div>
            <label for="heard_from">How did you hear about ReBe? <span class="req">*</span></label>
            <select id="heard_from" name="heard_from" required>
              <option value="">Choose…</option>
              <option value="Friend">A friend told me</option>
              <option value="ReBe team member">A ReBe team member</option>
              <option value="Elizabeth Good">Elizabeth Good directly</option>
              <option value="Reset workshop">I attended a Reset workshop</option>
              <option value="Social media">Social media (Instagram, Facebook, etc.)</option>
              <option value="Podcast or interview">Podcast or interview</option>
              <option value="Search">Found it on Google / search</option>
              <option value="Church or community">My church or community</option>
              <option value="Other">Other (please note below)</option>
            </select>
          </div>
          <div>
            <label for="referrer">Who referred you? <span class="opt">(if anyone)</span></label>
            <input type="text" id="referrer" name="referrer" placeholder="Their name">
          </div>
        </div>

        <div class="row">
          <div>
            <label>For breakout rooms, what are you comfortable with? <span class="req">*</span></label>
            <div class="checkgroup">
              <label><input type="radio" name="breakout_preference" value="Co-ed (mixed)" required><span>Co-ed (mixed)</span></label>
              <label><input type="radio" name="breakout_preference" value="Women only"><span>Women only</span></label>
              <label><input type="radio" name="breakout_preference" value="Men only"><span>Men only</span></label>
              <label><input type="radio" name="breakout_preference" value="No strong preference"><span>No strong preference</span></label>
            </div>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="notes">Anything else we should know? <span class="opt">(optional)</span></label>
            <textarea id="notes" name="notes" placeholder="What's bringing you here, what you're hoping for, anything you want Elizabeth and the team to know going in…"></textarea>
          </div>
        </div>
      </fieldset>

      <p class="msg error" id="form-error"></p>

      <div class="submit-row">
        <button type="submit" class="btn" id="submit-btn">Send to the team →</button>
      </div>
    </form>
  </div>

  <div class="success-card hidden" id="success-card">
    <h2>You're in. 💛</h2>
    <p>Thanks — your intake is saved. We'll be in touch with the cohort details soon. If you need anything in the meantime, email <a href="mailto:refresh@justrebe.com" style="color:var(--green-deep);text-decoration:underline">refresh@justrebe.com</a>.</p>
  </div>

  <div class="footer">
    <p>Questions? <a href="mailto:refresh@justrebe.com">refresh@justrebe.com</a> · ReBe · ReFresh Cohort</p>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('intake-form');
  var btn  = document.getElementById('submit-btn');
  var err  = document.getElementById('form-error');
  var card = document.getElementById('form-card');
  var ok   = document.getElementById('success-card');

  // Allow ?thanks=1 to land directly on the confirmation panel — used
  // when someone's first submit attempt errored and we need to send them
  // a confirmation link without having them re-fill the form.
  try {
    var params = new URLSearchParams(window.location.search);
    if (params.get('thanks') === '1' || params.get('thanks') === 'true') {
      if (card) card.style.display = 'none';
      if (ok)   ok.classList.remove('hidden');
    }
  } catch (_) {}

  function showError(msg) {
    err.textContent = msg;
    err.classList.add('show');
  }
  function hideError() {
    err.textContent = '';
    err.classList.remove('show');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();

    var fd = new FormData(form);
    var whyHere = fd.getAll('why_here');
    var data = {};
    fd.forEach(function (v, k) {
      if (k === 'why_here') return; // handled separately
      data[k] = String(v).trim();
    });

    if (!data.full_name)                                                                  return showError('Please enter your full name.');
    if (!data.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email))                    return showError('Please enter a valid email.');
    if (!data.phone || data.phone.replace(/\D/g,'').length < 10)                          return showError('Please enter a phone number (10+ digits).');
    if (!data.seat_type)                                                                  return showError('Please pick your role.');
    if (!data.group_type)                                                                 return showError('Please pick a cohort time slot.');
    if (!data.city)                                                                       return showError('Please add your city.');
    if (!data.country)                                                                    return showError('Please choose a country.');
    if (!data.prior_experience)                                                           return showError('Please tell us your prior ReBe experience.');
    if (whyHere.length === 0)                                                             return showError('Please pick at least one reason you\'re joining.');
    if (!data.heard_from)                                                                 return showError('Please choose how you heard about ReBe.');
    if (!data.breakout_preference)                                                        return showError('Please pick a breakout-room preference.');

    btn.disabled = true;
    btn.textContent = 'Sending…';

    // Compose payloads for both endpoints
    var dbPayload = Object.assign({}, data, { why_here: whyHere });
    var notifyPayload = {
      kind: 'cohort_intake',
      record: {
        full_name: data.full_name,
        email: data.email,
        phone: data.phone,
        city: data.city,
        state: data.state || '',
        country: data.country,
        cohort_slot: data.group_type,
        prior_experience: data.prior_experience,
        why_here: whyHere,
        heard_from: data.heard_from,
        referrer: data.referrer || '',
        breakout_preference: data.breakout_preference,
        notes: data.notes || ''
      }
    };

    try {
      // DB save is the critical one — must succeed
      var r = await fetch('/api/refresh-intake', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dbPayload),
      });
      var body = await r.json();
      if (!r.ok) {
        var msg = body.error || 'Couldn\'t save your intake.';
        if (body.detail) {
          var detailStr = typeof body.detail === 'string' ? body.detail : JSON.stringify(body.detail);
          msg += ' (' + detailStr.slice(0, 800) + ')';
        }
        throw new Error(msg);
      }

      // Notify (admin email + Kit tags + OpenPhone) — fire-and-forget; non-blocking
      fetch('/api/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(notifyPayload),
      }).catch(function (err) { console.warn('notify failed (non-fatal):', err); });

      card.classList.add('hidden');
      ok.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e2) {
      btn.disabled = false;
      btn.textContent = 'Send to the team →';
      showError(e2.message || 'Something went wrong. Please try again or email refresh@justrebe.com.');
    }
  });
})();
</script>
</body>
</html>
