    - region "You're still functioning. That's part of the problem." [ref=e52]:
      - generic [ref=e53]:
        - generic [ref=e54]:
          - paragraph [ref=e55]: Who this is for
          - heading "You're still functioning. That's part of the problem." [level=2] [ref=e56]
          - paragraph [ref=e57]: If you've been the one holding it together at work, at home, or both — and you've started to notice you're more tired than the day asks for — this hour is for you. Most of us were never taught how to use our imagination. We were handed fear loops, inherited worry, and survival patterns, and we ran them on repeat long enough that they started to feel like us.
          - list [ref=e58]:
            - listitem [ref=e59]: The capable one everyone calls first
            - listitem [ref=e60]: The parent who's running on coffee and goodwill
            - listitem [ref=e61]: The leader whose team thinks they're fine
            - listitem [ref=e62]: The friend who listens but never quite gets asked back
            - listitem [ref=e63]: The person who hasn't had a real conversation in months and hadn't noticed until just now
        - complementary [ref=e64]:
          - paragraph [ref=e65]: A note on who this isn't for
          - paragraph [ref=e66]: This isn't crisis care. If you're in acute distress, please reach out to a therapist, your doctor, or 988 (Suicide & Crisis Lifeline).
          - paragraph [ref=e67]: This hour is for the quieter place that comes before that — when something has been thinning out for a while and you'd like to name it before it gets worse.
    - region "Most of us were never taught how to use our imagination." [ref=e68]:
      - generic [ref=e69]:
        - paragraph [ref=e70]: What we're actually doing
        - heading "Most of us were never taught how to use our imagination." [level=2] [ref=e71]
        - paragraph [ref=e72]: We were handed fear loops, inherited worry, and survival patterns — and ran them so long they started to feel like us. Healthy visualization is the opposite. Not wishful thinking — rehearsal for a different future, before your body has lived it.
        - list [ref=e73]:
          - listitem [ref=e74]: ✓ Grounded in trauma recovery and nervous-system regulation
          - listitem [ref=e75]: ✓ Borrowed from elite performance coaching
          - listitem [ref=e76]: ✓ Built on attachment repair — not positive thinking
        - generic [ref=e77]:
          - generic [ref=e78]: 85%
          - generic [ref=e79]: of what you worry about never actually happens. Most of our thoughts just repeat on a loop. In one honest hour, we start to interrupt it.
    - region "This isn't a fix." [ref=e80]:
      - generic [ref=e81]:
        - paragraph [ref=e82]: What you'll walk away with
        - paragraph [ref=e83]: This isn't a fix.
        - generic [ref=e84]:
          - paragraph [ref=e85]: It's an hour — honestly led by Elizabeth Good — for adults who are tired in a way that doesn't quite have a name yet. You're still functioning. You're still showing up. And somewhere underneath, something has been thinning out for a while.
          - paragraph [ref=e86]: Come sit down. We'll name the loops you've been running without choosing them. You'll meet a few other people who are quietly in the same place. And you'll leave having practiced something most adults never get to — picturing safety. Envisioning freedom. Rehearsing a future worth living.
          - paragraph [ref=e87]: No pep talk. No homework. Just an hour that feels like a window opening.
