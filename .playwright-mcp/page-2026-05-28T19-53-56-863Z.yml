        - paragraph [ref=e106]: This isn't a fix.
        - generic [ref=e107]:
          - paragraph [ref=e108]: It's an hour — honestly led by Elizabeth Good — for adults who are tired in a way that doesn't quite have a name yet. You're still functioning. You're still showing up. And somewhere underneath, something has been thinning out for a while.
