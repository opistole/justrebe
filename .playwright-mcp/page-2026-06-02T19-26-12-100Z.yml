        - paragraph [ref=e28]: Why ReBe exists
        - heading "Somewhere between a therapy room and a classroom." [level=2] [ref=e29]:
          - text: Somewhere between a therapy room and a
          - emphasis [ref=e30]: classroom
          - text: .
        - paragraph [ref=e31]: Between a survivor's story and a child's silence, we found the same wound — and we built ReBe to heal it. Most of us were never taught how to use our imagination. We were handed fear loops, inherited worry, and survival patterns, and ran them so long they started to feel like us.
        - paragraph [ref=e32]: But the story isn't finished. You cannot heal what you've never been helped to understand.
        - paragraph [ref=e33]: ReBe is a guided, root-cause path from isolation into real community — picturing safety, envisioning freedom, rehearsing a future worth living. No performance. No pressure.
    - region "Three steps. No script. Real conversation." [ref=e34]:
