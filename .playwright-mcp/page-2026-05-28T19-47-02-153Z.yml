        - paragraph [ref=e105]: This isn't a fix.
        - generic [ref=e106]:
          - paragraph [ref=e107]: It's an hour — honestly led by Elizabeth Good — for adults who are tired in a way that doesn't quite have a name yet. You're still functioning. You're still showing up. And somewhere underneath, something has been thinning out for a while.
          - paragraph [ref=e108]: Come sit down. We'll name the loops you've been running without choosing them. You'll meet a few other people who are quietly in the same place. And you'll leave having practiced something most adults never get to — picturing safety. Envisioning freedom. Rehearsing a future worth living.
          - paragraph [ref=e109]: No pep talk. No homework. Just an hour that feels like a window opening.
