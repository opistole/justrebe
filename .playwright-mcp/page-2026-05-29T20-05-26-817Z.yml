    - region "The idea behind ReBe" [ref=e21]:
      - paragraph [ref=e23]: You cannot heal what you have never been helped to understand.
    - region "Somewhere between a therapy room and a classroom." [ref=e24]:
      - generic [ref=e25]:
        - paragraph [ref=e26]: Why ReBe exists
        - heading "Somewhere between a therapy room and a classroom." [level=2] [ref=e27]:
          - text: Somewhere between a therapy room and a
          - emphasis [ref=e28]: classroom
          - text: .
        - paragraph [ref=e29]: Somewhere between a therapy room and a classroom, between a survivor's story and a child's silence, we found the same wound — and we built ReBe to heal it.
        - paragraph [ref=e30]: Between us, we have spent over 70 years moving through every room where people suffer — the boardroom, the therapy office, the classroom, and the shelter. One of us is a therapist, founder of two anti-human trafficking nonprofits, and a counselor who has worked alongside survivors across every setting where healing is needed. The other has spent decades in classrooms and corridors of the Dept. of Education — as an educator, curriculum specialist, and K–12 Human Trafficking Specialist — building what children need to learn, and fighting for their right to be safe enough to do it.
        - paragraph [ref=e31]: You cannot heal what you have never been helped to understand.
        - paragraph [ref=e32]:
          - strong [ref=e33]: Just ReBe, LLC
          - text: is a whole-health platform built at the intersection of prevention, intervention, and innovative emotional healing — reaching people before the crisis, during it, and at the root of where it began. We serve two verticals, because wholeness cannot be addressed in one generation alone. Through our student vertical, K–12 schools receive EPICS Health Boosts, Literacy LABS, and professional development that nurtures the Emotional, Physical, Intellectual, Cultural, and Social health of all children and the educators who serve them. Through our adult vertical, we invite people into what we call their "story of them" — an ACEs-informed, root-cause self-discovery journey built on decades of therapeutic practice — then guide them from isolation into live, human community, because the U.S. Surgeon General has declared loneliness a public health epidemic, with social isolation now carrying health risks equivalent to smoking fifteen cigarettes a day.
        - paragraph [ref=e34]: The people we are both building for have been in our therapy offices, our classrooms, our nonprofit programs, and our case files — men and women, boys and girls — holding everything together on the outside and disappearing on the inside. What they have never had is someone helping them understand their own story, and showing them they have the power to rewrite it.
        - paragraph [ref=e35]: That is why ReBe exists.
        - paragraph [ref=e36]: Better me. Better we.
