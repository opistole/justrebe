        - heading "Most of us were never taught how to use our imagination." [level=2] [ref=e75]
        - paragraph [ref=e76]: We were handed fear loops, inherited worry, and survival patterns — and ran them so long they started to feel like us. Healthy visualization is the opposite. Not wishful thinking — rehearsal for a different future, before your body has lived it.
