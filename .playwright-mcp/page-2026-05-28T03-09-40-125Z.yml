                      - heading "Business Leader" [level=2] [ref=e129]:
                        - generic [ref=e134]: Business Leader
                      - generic:
                        - paragraph [ref=e135]:
                          - generic [ref=e136]: Being with people releasing a lifelong burden of shame and embracing freedom is a powerful, contagious experience. It was incredible to see each participant join in the process. It was always by invitation, never performative or coerced. I hope everyone has an opportunity to experience
                        - paragraph [ref=e137]:
                          - generic [ref=e138]: something like this.
                - generic [ref=e139]:
                  - generic:
                    - generic:
                      - heading "Ministry Leader" [level=2] [ref=e143]:
                        - generic [ref=e148]: Ministry Leader
                      - paragraph [ref=e149]:
                        - generic [ref=e153]: REAL TALK has been a transformative and awakening experience. I have been in ministry for 20 years, and have never encountered a tool like this. This pathway is special because it combines depth and digging with levity and hope... all at an unimaginably accelerated rate. REAL TALK revealed how God desired to not only heal my broken patterns, but to use this to impact others through global ministry.
                - generic [ref=e154]:
                  - generic:
                    - generic:
                      - heading "Youth Leader" [level=2] [ref=e158]:
                        - generic [ref=e163]: Youth Leader
                      - paragraph [ref=e164]:
                        - generic [ref=e169]: Our youth are hungry for a safe space to talk about the real struggles happening in their lives. They want to enter a church where they don't have to pretend they are perfect and can experience love, safety, and transparent leadership. They're dealing with profound issues, from grooming and pornography addictions to a lack of hope and self-worth. REAL TALK is the answer to this need.
                - generic [ref=e170]:
                  - generic:
                    - generic:
                      - heading "Organizational Leader" [level=2] [ref=e174]:
                        - generic [ref=e179]: Organizational Leader
                      - paragraph [ref=e180]:
                        - generic [ref=e185]: This was like five years of therapy in five sessions! I have seen firsthand, as a participant and facilitator, how transformational these groups are and how they create a domino effect of positive change. After experiencing it, you receive something fresh; you feel lighter and more filled with hope. Everyone needs REAL TALK!
