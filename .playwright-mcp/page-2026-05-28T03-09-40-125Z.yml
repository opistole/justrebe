                    - heading "Ready to Break Cycles Shame, Anxiety and Trauma at Their Source?" [level=2] [ref=e106]:
                      - generic [ref=e109]:
                        - text: Ready to Break Cycles Shame, Anxiety and Trauma
                        - text: at Their Source?
                    - paragraph [ref=e110]:
                      - generic [ref=e111]: Everyone needs REAL TALK! Emotions often stem from unaddressed root issues. Let us help you uncover these roots, guide you toward freedom, and protect future generations from falling into the same cycles.
                    - generic "Your Video Title Video Player" [ref=e112]
                    - paragraph [ref=e113]:
                      - generic [ref=e114]: Pastors need REAL TALK too! Church leaders are often the first line of support for individuals and families who are struggling... yet many lack the healing and tools themselves to offer help. REAL TALK leads pastors to the deeper healing they crave while equipping them with the tools, language, and confidence to recognize warning signs, respond wisely, and guide people toward healing resources.
                    - generic "Your Video Title Video Player" [ref=e115]
              - generic [ref=e124]:
                - generic [ref=e125]:
